dependency_rules:
  ptz_camera:
    requires_any:
      - [mounting_kit, control_processor]
      - [cable_hdmi, cable_usb]
    recommended_with:
      - camera_controller
      - cable_cat6
    optional_with:
      - poe_switch
      - camera_extension
    incompatible_with:
      - videobar

  videobar:
    requires_all:
      - display
      - cable_hdmi
    recommended_with:
      - control_processor
    incompatible_with:
      - ptz_camera

  discussion_system:
    requires_any:
      - [dsp_audio, audio_mixer]
      - [speaker_system, wall_speaker]
    recommended_with:
      - amplifier
      - wireless_mic

  led_cabinet:
    requires_all:
      - led_processor
      - led_mounting
    requires_any:
      - [power_distribution, electrical_cabinet]
      - [signal_distribution, fiber_extender]
    recommended_with:
      - spare_parts_kit

  videowall_controller:
    requires_all:
      - display
      - signal_distribution
    requires_any:
      - [matrix_switcher, video_processor]
      - [fiber_extender, hdmi_extender]
    recommended_with:
      - control_processor

  projector:
    requires_any:
      - [projection_screen, motorized_screen]
      - [projector_mount, mounting_kit]
    recommended_with:
      - presentation_switcher
      - wireless_presentation

  amplifier:
    requires_any:
      - [speaker_system, wall_speaker]
      - [speaker_100v]
    recommended_with:
      - dsp_audio

  dsp_audio:
    requires_any:
      - [wireless_mic, wired_mic]
      - [discussion_system]
    recommended_with:
      - amplifier

  control_processor:
    recommended_with:
      - touch_panel
      - control_interface
    optional_with:
      - relay_module
      - io_module

  display:
    requires_any:
      - [display_mount, mounting_kit]
      - [cable_hdmi, hdmi_extender]
    recommended_with:
      - control_processor

  speaker_system:
    requires_any:
      - [amplifier]
      - [dsp_audio, audio_mixer]
    recommended_with:
      - cable_speaker

  wall_speaker:
    requires_any:
      - [amplifier]
      - [dsp_audio, audio_mixer]
    recommended_with:
      - cable_speaker

  camera_controller:
    requires_any:
      - [control_processor]
      - [usb_hid_controller]

  matrix_switcher:
    requires_any:
      - [control_processor]
      - [touch_panel]
    recommended_with:
      - cable_hdmi
      - cable_cat6

  wireless_presentation:
    requires_any:
      - [display, projector]
    recommended_with:
      - control_processor

  audio_mixer:
    requires_any:
      - [amplifier]
      - [speaker_system, wall_speaker]
    recommended_with:
      - rack_accessories

  poe_switch:
    requires_any:
      - [cable_cat6]
      - [network_rack]

  fiber_extender:
    requires_any:
      - [fiber_patchcord]
      - [signal_distribution]
    recommended_with:
      - power_distribution

  hdmi_extender:
    requires_any:
      - [cable_cat6]
      - [signal_distribution]
    recommended_with:
      - power_distribution

  signal_distribution:
    recommended_with:
      - network_rack
      - cable_cat6

  power_distribution:
    recommended_with:
      - electrical_cabinet
      - ups

  ups:
    optional_with:
      - electrical_cabinet

  rack_accessories:
    optional_with:
      - network_rack

  network_rack:
    recommended_with:
      - rack_accessories
      - power_distribution

  touch_panel:
    requires_any:
      - [control_processor]
      - [control_interface]

  control_interface:
    requires_any:
      - [control_processor]

  relay_module:
    requires_any:
      - [control_processor]

  io_module:
    requires_any:
      - [control_processor]

  cable_hdmi:
    optional_with:
      - hdmi_extender

  cable_cat6:
    optional_with:
      - poe_switch

  cable_speaker:
    optional_with:
      - rack_accessories

  led_processor:
    requires_any:
      - [control_processor]
    recommended_with:
      - signal_distribution

  led_mounting:
    requires_any:
      - [mounting_kit]

  spare_parts_kit:
    optional_with:
      - led_cabinet